<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerse Audio Product Page - Array of Objects</title>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>
    <div class="header">

        <div class="logo">Audio Store</div>

        <button class="cart-btn" onclick="toggleCart()">

            cart

            <span class="cart-count" id="cartCount">0</span>

        </button>

    </div>

    <div class="hero">

        <h1>Premium Audio Products</h1>

        <p>Quality sound for everyone</p>

    </div>

    <div class="products-grid" id="productsGrid"></div>

    <div class="cart-modal" id="cartModal">
        
        <div class="cart-content">

            <div class="cart-header">Your Cart</div>

            <div id="cartItems"></div>

            <div class="cart-total">

                <span>Total:</span>

                <span id="cartTotal">$0</span>

            </div>

            <button class="close-btn" onclick="toggleCart()">Close</button>
        </div>

    </div>
    
    <script src="script.js"></script>

</body>
</html>
